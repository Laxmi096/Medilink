{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h1><a href="{{ url_for('view_patient_records', patient_id=patient.id) }}" class="back-link">←</a> Prescribe for {{ patient.username }}</h1>
</div>
<div class="content-area" style="max-width: 700px; margin: 0 auto;">
    <div class="content-card glass-card">
        <div class="card-header">
            <h3>New Prescription Details</h3>
        </div>
        <div class="card-body">
            <form method="POST" action="">
                <div class="form-group">
                    <label for="medication_name">Medication Name</label>
                    <input type="text" id="medication_name" name="medication_name" placeholder="e.g., Amoxicillin" required>
                </div>
                <div class="form-group">
                    <label for="dosage">Dosage</label>
                    <input type="text" id="dosage" name="dosage" placeholder="e.g., 500mg" required>
                </div>
                <div class="form-group">
                    <label for="frequency">Frequency</label>
                    <input type="text" id="frequency" name="frequency" placeholder="e.g., Every 8 hours" required>
                </div>
                <div class="form-group">
                    <label for="duration">Duration (in days)</label>
                    <input type="number" id="duration" name="duration" placeholder="e.g., 7" required min="1">
                </div>
                <div class="form-group">
                    <label for="notes">Additional Notes (Optional)</label>
                    <textarea id="notes" name="notes" rows="3" placeholder="e.g., Take with food."></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;">Add Prescription</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
