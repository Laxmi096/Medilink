{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h1><a href="{{ url_for('dashboard') }}" class="back-link">←</a> AI Health Assistant</h1>
    <p>Ask questions and understand complex medical terms in simple language.</p>
</div>

<div class="content-area">
    <div class="ai-page-layout">

        <div class="ai-chat-panel">
            <div id="chat-container">
                <div id="chat-window">
                    <div class="chat-message bot">
                        Hello! I am the MediLink+ AI Assistant. How can I help you today?
                    </div>
                </div>
                <div id="typing-indicator" style="display: none;">
                    <span></span><span></span><span></span>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input" placeholder="Ask a question about a medical term..." autocomplete="off">
                    <button id="send-button">→</button>
                </div>
            </div>
        </div>

        <div class="content-card glass-card">
            <div class="card-body" style="text-align: center; padding: 3rem;">
                <div class="ai-logo-container">
                    <svg class="ai-logo-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7V17L12 22L22 17V7L12 2Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M12 8V16M8 12H16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                
                <h4 style="margin-top: 2rem; font-size: 1.25rem;">MediLink+ AI</h4>
                <p style="color: var(--text-secondary);">I am ready to help. Ask me a question on the left.</p>
            </div>
        </div>

    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const chatInput = document.getElementById('chat-input');
        const chatWindow = document.getElementById('chat-window');
        const sendButton = document.getElementById('send-button');
        const typingIndicator = document.getElementById('typing-indicator');

        const handleSendMessage = (message) => {
            const userMessage = message.trim();
            if (userMessage === '') return;

            appendMessage(userMessage, 'user');
            chatInput.value = '';
            typingIndicator.style.display = 'block';

            fetch('/ask_ai', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: userMessage })
            })
            .then(response => response.json())
            .then(data => {
                if (data.response) { appendMessage(data.response, 'bot'); }
                else { appendMessage(data.error || 'An unknown error occurred.', 'bot error'); }
            })
            .catch(error => { appendMessage('Failed to connect to the AI assistant.', 'bot error'); })
            .finally(() => { typingIndicator.style.display = 'none'; });
        };

        sendButton.addEventListener('click', () => handleSendMessage(chatInput.value));
        chatInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                handleSendMessage(chatInput.value);
            }
        });

        function appendMessage(message, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'chat-message ' + type;
            message = message.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            messageDiv.innerHTML = message.replace(/\n/g, '<br>');
            chatWindow.appendChild(messageDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    });
</script>
{% endblock %}
