{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h1>My Profile</h1>
</div>
<div class="content-area" style="max-width: 700px; margin: 0 auto;">
    <div class="content-card">
        <div class="card-header">
            <h3>Update Your Information</h3>
        </div>
        <div class="card-body">
            <form method="POST" action="">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" value="{{ current_user.username }}" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address (cannot be changed)</label>
                    <input type="email" id="email" name="email" value="{{ current_user.email }}" readonly disabled style="background-color: #f3f4f6;">
                </div>
                <hr style="margin: 2rem 0; border: 0; border-top: 1px solid var(--border-color);">
                <div class="form-group">
                    <label for="new_password">New Password</label>
                    <input type="password" id="new_password" name="new_password" placeholder="Leave blank to keep current password">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;">Update Profile</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
